name: Run A2UI Evals

on:
  push:
    branches: [main]
    paths:
      - "eval/**"
      - "specification/v0_9/**"
      - ".github/workflows/run_evals.yml"
  pull_request:
    paths:
      - "eval/**"
      - "specification/v0_9/**"
      - ".github/workflows/run_evals.yml"

jobs:
  run-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install `uv` globally
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Decrypt dataset
        working-directory: eval
        if: ${{ secrets.TRANSCRYPT_PASSWORD != '' }}
        env:
          TRANSCRYPT_PASSWORD: ${{ secrets.TRANSCRYPT_PASSWORD }}
        run: ./bin/transcrypt -p "$TRANSCRYPT_PASSWORD"

      - name: Run Evals
        working-directory: eval
        if: ${{ secrets.TRANSCRYPT_PASSWORD != '' && secrets.REPO_GEMINI_API_KEY != '' }}
        env:
          GEMINI_API_KEY: ${{ secrets.REPO_GEMINI_API_KEY }}
        run: ./bin/run_ci_evals.py --threshold 85

      - name: Create Issue if evals fail post-submit on main branch
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha
            });
            
            const prLink = prs.data.length > 0 ? `Associated PR: #${prs.data[0].number}` : "No associated PR found";
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Evals failed on main',
              labels: ['eval_failure'],
              body: `The evals workflow failed on main for commit ${context.sha}.
            ${prLink}
            See logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
