        <style type="text/css" id="generated-style"><![CDATA[#screen {
                font-family: 'DejaVu Sans Mono', monospace;
                font-style: normal;
                font-size: 14px;
            }

        text {
            dominant-baseline: text-before-edge;
            white-space: pre;
        }
    
            :root {
                --animation-duration: 1006ms;
            }

            @keyframes roll {
                0.000%{transform:translateY(0px)}
0.099%{transform:translateY(-612px)}
0.398%{transform:translateY(-1224px)}
0.596%{transform:translateY(-1836px)}
100.000%{transform:translateY(-1836px)}
            }

            #screen_view {
                animation-duration: 1006ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
