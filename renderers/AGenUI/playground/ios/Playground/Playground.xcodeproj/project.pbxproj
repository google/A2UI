			shellScript = "# Sync templates folder from resource/stories to project AND bundle\nSRC_DIR=\"${SRCROOT}/../../resource/stories\"\nPROJECT_TEMPLATES_DIR=\"${SRCROOT}/Playground for AGenUI/Templates\"\n\n# 1. Sync to project directory (for Xcode reference)\nif [ -d \"$PROJECT_TEMPLATES_DIR\" ]; then\n    rm -rf \"$PROJECT_TEMPLATES_DIR\"\n    echo \"🗑️  Removed old project Templates folder\"\nfi\n\nmkdir -p \"$PROJECT_TEMPLATES_DIR\"\n\nif [ -d \"$SRC_DIR/A2UI Show\" ]; then\n    cp -R \"$SRC_DIR/A2UI Show\" \"$PROJECT_TEMPLATES_DIR/A2UI Show\"\n    echo \"✅ A2UI Show synced to project: $PROJECT_TEMPLATES_DIR\"\nelse\n    echo \"❌ Source folder not found: $SRC_DIR/A2UI Show\"\n    exit 1\nfi\n\n# 2. Also copy directly to Build Bundle (ensure it's packaged)\nBUNDLE_TEMPLATES_DIR=\"${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/Templates\"\nif [ -d \"$BUNDLE_TEMPLATES_DIR\" ]; then\n    rm -rf \"$BUNDLE_TEMPLATES_DIR\"\nfi\n\nif [ -d \"$SRC_DIR/A2UI Show\" ]; then\n    mkdir -p \"$BUNDLE_TEMPLATES_DIR\"\n    cp -R \"$SRC_DIR/A2UI Show\" \"$BUNDLE_TEMPLATES_DIR/A2UI Show\"\n    echo \"✅ A2UI Show copied to Bundle: $BUNDLE_TEMPLATES_DIR\"\n    \n    # Show stats\n    FILE_COUNT=$(find \"$BUNDLE_TEMPLATES_DIR/A2UI Show\" -type f | wc -l | tr -d ' ')\n    DIR_COUNT=$(find \"$BUNDLE_TEMPLATES_DIR/A2UI Show\" -type d | wc -l | tr -d ' ')\n    echo \"📊 Synced $FILE_COUNT files in $DIR_COUNT directories\"\nfi\n";
